server:
  port: 8082

logging:
  level:
    org.springframework.security: DEBUG

spring:
  datasource:
    # Replace 'localhost', '5432', and 'your_database_name' with your actual database details
    url: jdbc:postgresql://localhost:5432/exam_testdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' automatically creates or modifies database tables based on your Java entities.
      # Change to 'validate' or 'none' in production.
      ddl-auto: update

    # Shows the executed SQL queries in the IntelliJ console (very helpful for debugging)
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: "${JWT_SECRET:saiofal;vkasfbehwqpofhjashofjaswfpojasfvbafop[hfifonfo[shjfwefjjfslajfsahfoshffasnbash[f}"
    issuer: "${JWT_ISSUER:api.substring.com}"
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}
    cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}
